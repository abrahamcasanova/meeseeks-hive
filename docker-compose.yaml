services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: meeseeks
      POSTGRES_PASSWORD: meeseeks
      POSTGRES_DB: meeseeks_hive
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeseeks -d meeseeks_hive"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ~/.aws:/root/.aws:ro
    environment:
      DATABASE_URL: postgresql://meeseeks:meeseeks@postgres:5432/meeseeks_hive
      NODE_ENV: production
    env_file:
      - .env
    profiles:
      - full

volumes:
  pgdata:
